spring:
  application:
    name: transport-backend
  config:
    import: optional:file:.env[.properties]
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/transport_backend?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    open-in-view: true
  h2:
    console:
      enabled: false
  mail:
    host: ${MAIL_HOST:}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api

app:
  mail:
    from: ${MAIL_FROM:no-reply@transport.local}
  storage:
    chat-dir: ${CHAT_STORAGE_DIR:uploads/chat}
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000}
  security:
    jwt-secret: ${JWT_SECRET:change-this-secret-in-production}
    jwt-expiration-minutes: 480
  backup:
    mysqldump-command: ${APP_BACKUP_MYSQLDUMP_COMMAND:mysqldump}
