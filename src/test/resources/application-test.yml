spring:
  datasource:
    url: jdbc:h2:mem:transport-backend-test;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: false
    open-in-view: false
  h2:
    console:
      enabled: false
  mail:
    host: localhost
    port: 2525
    username: test
    password: test

app:
  mail:
    from: test@transport.local
  storage:
    chat-dir: target/test-chat
  security:
    jwt-secret: test-secret-for-context-loads-256-bits-minimum-key
    jwt-expiration-minutes: 60
